name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: true

      - name: Build
        working-directory: ./react-native-mcu-manager
        run: pnpm build

  android-example:
      name: Android example app
      runs-on: ubuntu-latest
      needs: build
      steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '18'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: true

      - name: Making sure the android example app builds
        run: |
          cd example
          npx expo prebuild --platform android

          cd android

          # Pre-fetch the Gradle distribution with retries so a transient
          # services.gradle.org outage (e.g. HTTP 504) doesn't fail the build.
          # Only the network bootstrap is retried; the build itself runs once,
          # so genuine build failures are never masked.
          for attempt in 1 2 3; do
            if ./gradlew --version; then
              break
            elif [ "$attempt" -eq 3 ]; then
              echo "Gradle wrapper download failed after 3 attempts"
              exit 1
            else
              echo "Gradle bootstrap attempt $attempt failed; retrying in 15s"
              sleep 15
            fi
          done

          ./gradlew app:assembleRelease --no-daemon -Dorg.gradle.logging.level=warn

  ios-example:
      name: iOS example app
      runs-on: macos-26
      needs: build
      steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: true

      - name: Making sure the ios example app builds
        run: |
          cd example
          npx expo prebuild --platform ios

          cd ios
          xcodebuild build -workspace reactnativemcumanagerexample.xcworkspace -scheme reactnativemcumanagerexample CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

  release:
    name: Release
    needs: [android-example, ios-example]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24

    - name: Setup PNPM
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        version: 11.7.0
        run_install: true

    - name: Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      working-directory: react-native-mcu-manager
      run: npx semantic-release
