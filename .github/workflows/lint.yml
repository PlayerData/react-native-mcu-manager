name: Lint

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install package dependencies
        run: pnpm install

      - name: Install example app dependencies
        working-directory: ./example
        run: pnpm install

      - name: Lint
        run: pnpm lint
